# ---------------------------------------------------------------------------
# Device inventory — THE surface you edit to add or retire hardware.
#
# Grouping is by ROLE. Role -> monitoring profile + compliance baseline + the
# Dynatrace tags that alerts/dashboards bind to. Because binding is tag-based,
# a new host under the right group inherits all monitoring with zero extra work.
#
# To ADD hardware:   add a host line under the correct role group (+ optional host_vars).
# To RETIRE hardware: remove the host line and run device_retire.yml first.
# ---------------------------------------------------------------------------
all:
  children:

    core_switches:
      hosts:
        core-sw-01: { ansible_host: 10.0.1.11, site: chi-dc1, mgmt_serial: FOC1111 }
        core-sw-02: { ansible_host: 10.0.1.12, site: chi-dc1, mgmt_serial: FOC1112 }
        core-sw-05: { ansible_host: 10.0.1.15, site: chi-dc1, mgmt_serial: FOC1115 }

    edge_routers:
      hosts:
        edge-rtr-01: { ansible_host: 10.0.2.11, site: chi-dc1, mgmt_serial: FTX2211 }
        edge-rtr-02: { ansible_host: 10.0.2.12, site: mke-dc2, mgmt_serial: FTX2212 }

    firewalls:
      hosts:
        fw-perim-01: { ansible_host: 10.0.3.11, site: chi-dc1, mgmt_serial: JAD3311 }

  # Global connection defaults for all network devices
  vars:
    ansible_connection: network_cli
    ansible_network_os: ios      # VERIFY: set per your fleet (ios / nxos / eos / junos ...)
