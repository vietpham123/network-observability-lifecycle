# Monitoring profile + compliance baseline for the core_switches role.
# Adding a switch to this group means it inherits ALL of the below automatically.
net_role: core_switch
net_class: switch

# Tags stamped onto the Dynatrace entity (via auto-tag rules keyed on these).
# NOTE: we tag by ROLE/SITE/CLASS, never by serial/hostname -> no orphaning on swap.
dynatrace_tags:
  net_role: "core_switch"
  net_class: "switch"
  managed_by: "ansible-caac"

# SNMP / extension monitoring hints consumed by device_config + the ActiveGate extension.
snmp:
  version: v3            # VERIFY per device
  profile: cisco_switch  # maps to an SNMP extension monitoring config

# Which compliance controls apply to this role (subset of the full baseline).
compliance_controls:
  - no_telnet
  - ssh_v2_only
  - snmp_not_default_community
  - logging_host_set
  - ntp_configured
