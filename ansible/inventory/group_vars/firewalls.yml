net_role: firewall
net_class: firewall
dynatrace_tags:
  net_role: "firewall"
  net_class: "firewall"
  managed_by: "ansible-caac"
snmp:
  version: v3
  profile: firewall_generic
compliance_controls:
  - no_telnet
  - ssh_v2_only
  - snmp_not_default_community
  - logging_host_set
  - ntp_configured
  - default_deny_ruleset  # role-specific control
