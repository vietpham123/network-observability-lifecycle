name: network-observability-lifecycle
# On a change to inventory or Dynatrace config, reconcile BOTH layers.
# This is the GitOps loop: a device change and its monitoring change ship together.
on:
  push:
    branches: [ main ]
    paths:
      - "ansible/**"
      - "dynatrace-monaco/**"
      - "dynatrace-terraform/**"
  workflow_dispatch:
    inputs:
      caac_tool:
        description: "monaco or terraform"
        default: "monaco"

env:
  DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}   # store in repo/org secrets, never in git

jobs:
  reconcile-observability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Dynatrace config as code
        run: |
          ansible-playbook ansible/playbooks/dynatrace_sync.yml \
            -e caac_tool="${{ github.event.inputs.caac_tool || 'monaco' }}"

  drift-check:
    # Catches out-of-band UI changes to monitoring config (governance).
    runs-on: ubuntu-latest
    needs: reconcile-observability
    steps:
      - uses: actions/checkout@v4
      - name: Download live Dynatrace config and diff against git
        run: |
          cd dynatrace-monaco
          monaco download --manifest manifest.yaml --environment production --output /tmp/live || true
          echo "Diff /tmp/live against committed config; fail the job on unexpected drift."
          # VERIFY: wire an actual diff/exit-code gate here for your governance policy.
